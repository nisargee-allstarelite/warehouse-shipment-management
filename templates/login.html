<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Awaiting Shipment Dashboard</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f6f7f9;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }
  .box {
    background: white;
    border: 1px solid #e3e5e9;
    border-radius: 12px;
    padding: 32px;
    width: 320px;
    text-align: center;
  }
  h1 { font-size: 18px; margin: 0 0 20px 0; color: #1a1d23; }
  input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #e3e5e9;
    border-radius: 8px;
    font-size: 14px;
    box-sizing: border-box;
    margin-bottom: 12px;
  }
  button {
    width: 100%;
    background: #0f766e;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
  }
  button:hover { opacity: 0.9; }
  .error {
    color: #b91c1c;
    font-size: 13px;
    margin-bottom: 12px;
  }
</style>
</head>
<body>
  <div class="box">
    <h1>Awaiting Shipment Dashboard</h1>
    <form method="POST">
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
      <input type="password" name="password" placeholder="Password" autofocus required>
      <button type="submit">Log in</button>
    </form>
  </div>
</body>
</html>
